name: Keep backend warm

# Pings the Render free-tier backend so it never sleeps (Render spins a free
# service down after ~15 min idle, causing a 30-60s cold start on the next
# request). Keeping it warm makes sign-up/login instant for users and reviewers.

on:
  schedule:
    # Each run loops for ~5.5h, pinging every 5 min. Starting a new run every
    # 5h keeps coverage continuous without creating a large queue of scheduled
    # runs that GitHub cancels under the concurrency group.
    - cron: "0 */5 * * *"
  # Allows running it manually from the Actions tab too.
  workflow_dispatch:

# Don't cancel a running keep-warm loop when a new scheduled run starts; let the
# fresh run queue/overlap so coverage is continuous rather than interrupted.
concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    # GitHub's hard job cap is 6h; stop comfortably short of it.
    timeout-minutes: 340
    steps:
      - name: Keep backend awake (self-pinging loop)
        run: |
          URL="https://sakthi-vqm2.onrender.com/"
          DURATION=$((330 * 60))   # run the loop for ~5.5 hours
          INTERVAL=300             # ping every 5 min (Render sleeps after ~15)
          end=$(( $(date +%s) + DURATION ))
          while [ "$(date +%s)" -lt "$end" ]; do
            # --max-time 90 tolerates a cold start; any HTTP response means it's up.
            code=$(curl -sS --max-time 90 -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            echo "$(date -u +%H:%M:%S) HTTP $code"
            sleep "$INTERVAL"
          done
          echo "Keep-warm loop finished."
