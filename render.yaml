# Render Blueprint for the Sakthi Django backend.
# In Render: New + -> Blueprint -> connect this repo. Render reads this file,
# creates the Postgres database and the web service, then prompts you for the
# secret values marked `sync: false`.

databases:
  - name: sakthi-db
    plan: free
    region: singapore

services:
  - type: web
    name: sakthi
    runtime: python
    plan: free
    region: singapore
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn authproject.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # Database connection string, injected automatically from sakthi-db.
      - key: DATABASE_URL
        fromDatabase:
          name: sakthi-db
          property: connectionString
      # Django generates a strong random secret for you.
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # Must match the service's public hostname (update if the name changes).
      - key: ALLOWED_HOSTS
        value: sakthi-vqm2.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://sakthi-vqm2.onrender.com
      - key: SITE_URL
        value: https://sakthi-vqm2.onrender.com
      # ── Secrets: Render will prompt for these on first deploy ──
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_WEB_CLIENT_ID
        sync: false
      # Paste the entire contents of serviceAccountKey.json as one line (optional;
      # only needed for push notifications).
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
