# Render Blueprint for the Sakthi Django backend.
# In Render: New + -> Blueprint -> connect this repo. Render reads this file,
# creates the web service, then prompts you for the secret values marked
# `sync: false` (including DATABASE_URL — a free Neon Postgres connection string).
#
# The database is hosted on Neon (free forever), NOT on Render. Render's free
# Postgres expires; Neon's does not. See the migration note on DATABASE_URL below.

services:
  - type: web
    name: sakthi
    runtime: python
    plan: free
    region: singapore
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn authproject.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # Database connection string for Neon Postgres (free forever).
      # Render prompts for this on deploy and stores it as a secret — it is NOT
      # committed to git. Paste Neon's DIRECT connection string (the host WITHOUT
      # "-pooler"), so Django migrations run cleanly. Must end with ?sslmode=require.
      - key: DATABASE_URL
        sync: false
      # Django generates a strong random secret for you.
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # Must match the service's public hostname (update if the name changes).
      - key: ALLOWED_HOSTS
        value: sakthi-vqm2.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://sakthi-vqm2.onrender.com
      - key: SITE_URL
        value: https://sakthi-vqm2.onrender.com
      # ── Secrets: Render will prompt for these on first deploy ──
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_WEB_CLIENT_ID
        sync: false
      # Paste the entire contents of serviceAccountKey.json as one line (optional;
      # only needed for push notifications).
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
